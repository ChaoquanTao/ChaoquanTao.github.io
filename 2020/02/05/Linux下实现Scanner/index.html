ine">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br></pre></td><td class="code"><pre><span class="line">#include &quot;pcap.h&quot;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">main()</span><br><span class="line">&#123;</span><br><span class="line">pcap_if_t *alldevs;</span><br><span class="line">pcap_if_t *d;</span><br><span class="line">int inum;</span><br><span class="line">int i&#x3D;0;</span><br><span class="line">pcap_t *adhandle;</span><br><span class="line">int res;</span><br><span class="line">char errbuf[PCAP_ERRBUF_SIZE];</span><br><span class="line">struct tm *ltime;</span><br><span class="line">char timestr[16];</span><br><span class="line">struct pcap_pkthdr *header;</span><br><span class="line">const u_char *pkt_data;</span><br><span class="line">time_t local_tv_sec;</span><br><span class="line">​    </span><br><span class="line">​    </span><br><span class="line">    &#x2F;* 获取本机设备列表 *&#x2F;</span><br><span class="line">    if (pcap_findalldevs_ex(PCAP_SRC_IF_STRING, NULL, &amp;alldevs, errbuf) &#x3D;&#x3D; -1)</span><br><span class="line">    &#123;</span><br><span class="line">        fprintf(stderr,&quot;Error in pcap_findalldevs: %s\n&quot;, errbuf);</span><br><span class="line">        exit(1);</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">    &#x2F;* 打印列表 *&#x2F;</span><br><span class="line">    for(d&#x3D;alldevs; d; d&#x3D;d-&gt;next)</span><br><span class="line">    &#123;</span><br><span class="line">        printf(&quot;%d. %s&quot;, ++i, d-&gt;name);</span><br><span class="line">        if (d-&gt;description)</span><br><span class="line">            printf(&quot; (%s)\n&quot;, d-&gt;description);</span><br><span class="line">        else</span><br><span class="line">            printf(&quot; (No description available)\n&quot;);</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">    if(i&#x3D;&#x3D;0)</span><br><span class="line">    &#123;</span><br><span class="line">        printf(&quot;\nNo interfaces found! Make sure WinPcap is installed.\n&quot;);</span><br><span class="line">        return -1;</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">    printf(&quot;Enter the interface number (1-%d):&quot;,i);</span><br><span class="line">    scanf(&quot;%d&quot;, &amp;inum);</span><br><span class="line">    </span><br><span class="line">    if(inum &lt; 1 || inum &gt; i)</span><br><span class="line">    &#123;</span><br><span class="line">        printf(&quot;\nInterface number out of range.\n&quot;);</span><br><span class="line">        &#x2F;* 释放设备列表 *&#x2F;</span><br><span class="line">        pcap_freealldevs(alldevs);</span><br><span class="line">        return -1;</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">    &#x2F;* 跳转到已选中的适配器 *&#x2F;</span><br><span class="line">    for(d&#x3D;alldevs, i&#x3D;0; i&lt; inum-1 ;d&#x3D;d-&gt;next, i++);</span><br><span class="line">    </span><br><span class="line">    &#x2F;* 打开设备 *&#x2F;</span><br><span class="line">    if ( (adhandle&#x3D; pcap_open(d-&gt;name,          &#x2F;&#x2F; 设备名</span><br><span class="line">                              65536,            &#x2F;&#x2F; 要捕捉的数据包的部分 </span><br><span class="line">                                                &#x2F;&#x2F; 65535保证能捕获到不同数据链路层上的每个数据包的全部内容</span><br><span class="line">                              PCAP_OPENFLAG_PROMISCUOUS,    &#x2F;&#x2F; 混杂模式</span><br><span class="line">                              1000,             &#x2F;&#x2F; 读取超时时间</span><br><span class="line">                              NULL,             &#x2F;&#x2F; 远程机器验证</span><br><span class="line">                              errbuf            &#x2F;&#x2F; 错误缓冲池</span><br><span class="line">                              ) ) &#x3D;&#x3D; NULL)</span><br><span class="line">    &#123;</span><br><span class="line">        fprintf(stderr,&quot;\nUnable to open the adapter. %s is not supported by WinPcap\n&quot;, d-&gt;name);</span><br><span class="line">        &#x2F;* 释放设列表 *&#x2F;</span><br><span class="line">        pcap_freealldevs(alldevs);</span><br><span class="line">        return -1;</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">    printf(&quot;\nlistening on %s...\n&quot;, d-&gt;description);</span><br><span class="line">    </span><br><span class="line">    &#x2F;* 释放设备列表 *&#x2F;</span><br><span class="line">    pcap_freealldevs(alldevs);</span><br><span class="line">    </span><br><span class="line">    &#x2F;* 获取数据包 *&#x2F;</span><br><span class="line">    while((res &#x3D; pcap_next_ex( adhandle, &amp;header, &amp;pkt_data)) &gt;&#x3D; 0)&#123;</span><br><span class="line">        </span><br><span class="line">        if(res &#x3D;&#x3D; 0)</span><br><span class="line">            &#x2F;* 超时时间到 *&#x2F;</span><br><span class="line">            continue;</span><br><span class="line">        </span><br><span class="line">        &#x2F;* 将时间戳转换成可识别的格式 *&#x2F;</span><br><span class="line">        local_tv_sec &#x3D; header-&gt;ts.tv_sec;</span><br><span class="line">        ltime&#x3D;localtime(&amp;local_tv_sec);</span><br><span class="line">        strftime( timestr, sizeof timestr, &quot;%H:%M:%S&quot;, ltime);</span><br><span class="line">        </span><br><span class="line">        printf(&quot;%s,%.6d len:%d\n&quot;, timestr, header-&gt;ts.tv_usec, header-&gt;len);</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">    if(res &#x3D;&#x3D; -1)&#123;</span><br><span class="line">        printf(&quot;Error reading the packets: %s\n&quot;, pcap_geterr(adhandle));</span><br><span class="line">        return -1;</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">    return 0;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
